<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Despacho - Painel de Docas</title>

  <!-- Configuração e instruções de deploy: ver README.md -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --bg: #0B0F1A;
      --bg-elevated: #11172A;
      --surface: #161D33;
      --surface-2: #1D2540;
      --border: #2A3354;
      --border-soft: #232B47;
      --text: #F4F1E8;
      --text-muted: #9CA6C4;
      --text-faint: #707CA0;
      --gold: #C9A350;
      --gold-soft: #E3C57E;
      --gold-dark: #8C6F2E;
      --gold-bg: rgba(201, 163, 80, 0.10);
      --blue: #5B8DEF;
      --blue-bg: rgba(91, 141, 239, 0.10);
      --red: #E5483D;
      --red-bg: rgba(229, 72, 61, 0.12);
      --green: #34C77B;
      --green-bg: rgba(52, 199, 123, 0.12);
      --amber: #E0A23B;
      --amber-bg: rgba(224, 162, 59, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
    }

    .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; }
    .font-data { font-family: 'JetBrains Mono', ui-monospace, monospace; }

    input::placeholder, textarea::placeholder { color: var(--text-faint); }
    select { color-scheme: dark; }

    @keyframes pulse-emergency {
      0%, 100% { box-shadow: 0 0 0 0 rgba(229, 72, 61, 0.5); }
      50% { box-shadow: 0 0 0 8px rgba(229, 72, 61, 0); }
    }
    .emergency-pulse { animation: pulse-emergency 1.8s ease-out infinite; }

    @keyframes ping-slow {
      0% { transform: scale(0.9); opacity: 0.7; }
      100% { transform: scale(1.8); opacity: 0; }
    }
    .ping-ring { animation: ping-slow 1.4s cubic-bezier(0,0,0.2,1) infinite; }

    @keyframes shake-once {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    .shake-once { animation: shake-once 0.4s ease-in-out; }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Edite suas credenciais em js/firebase-config.js -->
  <script src="js/firebase-config.js"></script>
  <!-- Lógica do app, já compilada para JavaScript puro (sem Babel) -->
  <script src="js/app.js"></script>
</body>
</html>
